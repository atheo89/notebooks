# Update this file, then run:
#   gmake sync-build-args-from-versions
# Then refresh locks with:
#   gmake refresh-lock-files
# `release.full_version` is authoritative for the RHDS release version.
# For `konflux.*.conf`, the sync rewrites the `BASE_IMAGE` tag version to this
# value and preserves the existing phase/build suffix.
# `release.rhds_os_base` controls the RHDS image OS segment, e.g. `el9.6`.
# Non-`base-images` build-args no longer store `INDEX_URL`.
# Lock generation derives the effective index dynamically from `PROFILE`
# and `BASE_IMAGE`.
schema_version: 1

release:
  full_version: "3.5.0"
  rhds_os_base: el9.6

artifacts:
  base_image:
    cpu:
      rhds:
        acc_version: <full_version>
      odh:
        acc_version: latest

    cuda:
      minimal:
        rhds: { acc_version: 13.0 }
        odh:  { acc_version: v13.0 }
      pytorch:
        rhds: { acc_version: 13.0 }
        odh:  { acc_version: v13.0 }
      pytorch-llmcompressor:
        rhds: { acc_version: 13.0 }
        odh:  { acc_version: v13.0 }
      tensorflow:
        rhds: { acc_version: 12.9 }
        odh:  { acc_version: v12.9 }

    rocm:
      minimal:
        rhds: { acc_version: 7.1 }
        odh:  { acc_version: v7.1 }
      pytorch:
        rhds: { acc_version: 7.1 }
        odh:  { acc_version: v7.1 }
      tensorflow:
        rhds: { acc_version: 7.1 }
        odh:  { acc_version: v7.1 }